<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
  <title>Gmail Replacer</title>
</head>
<body>
  <h3>Gmail Replacer</h3>
  <input type="text" id="from" placeholder="Отправитель" />
  <input type="text" id="email" placeholder="email" />
  <input type="text" id="theme" placeholder="Тема" />
  <input type="text" id="start" placeholder="Начало письма" />
  <button id="submit">Сгенерировать тему</button>
  <p id="output"></p>  
  <button id="copy">Скопировать</button>
  <input type="text" id="folder" placeholder="Папка для писем" />
  <button id="setFolder">Сохранить</button>
  <script src="popup.js"></script>
</body>
</html>
